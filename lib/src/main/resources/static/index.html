<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postgres 18 Dashboard</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; position: relative; }
        
        h2 { text-align: center; color: var(--dark); margin-bottom: 1.5rem; border-bottom: 2px solid var(--light); padding-bottom: 10px; }
        h3 { font-size: 16px; color: #666; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .section { background: var(--light); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        button { border: none; padding: 12px; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-add { background-color: var(--success); width: 100%; }
        .btn-send { background-color: var(--primary); width: 100%; }
        .btn-clear { background-color: var(--danger); width: 100%; margin-top: 10px; font-size: 12px; }

        /* Notification Banner */
        #statusBanner { display: none; padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-weight: bold; }
        .bg-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .bg-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #f1f3f5; }

        .loader { display: none; text-align: center; color: var(--primary); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="statusBanner"></div>

    <h2>PostgreSQL 18 Manager</h2>

    <div class="section">
        <h3>➕ Add New Entry</h3>
        <input type="text" id="name" placeholder="User Name">
        <input type="email" id="emailData" placeholder="User Email">
        <textarea id="desc" placeholder="Notes/Description" rows="2"></textarea>
        <button class="btn-add" onclick="addData()">Add to Database</button>
    </div>

    <div class="section">
        <h3>📧 Send Database Report</h3>
        <input type="email" id="recipientEmail" placeholder="Recipient Email (Where to send report?)">
        <div id="emailLoader" class="loader">🔄 Contacting Google & Sending...</div>
        <button class="btn-send" id="sendBtn" onclick="sendEmail()">Send Report via Gmail</button>
    </div>

    <h3>📊 Live Database View</h3>
    <table id="dataTable">
        <thead>
            <tr><th>Name</th><th>Email</th><th>Notes</th></tr>
        </thead>
        <tbody id="dataTableBody"></tbody>
    </table>

    <button class="btn-clear" onclick="clearData()">🗑️ Wipe All Records</button>
</div>

<script>
    window.onload = function() {
        loadTable();

        // Handle URL parameters for visual feedback
        const urlParams = new URLSearchParams(window.location.search);
        const banner = document.getElementById('statusBanner');

        if (urlParams.has('sent')) {
            banner.innerText = "📧 Success! The email report was sent via Gmail API.";
            banner.className = "bg-success";
            banner.style.display = "block";
            
            window.history.replaceState({}, document.title, "/");
            setTimeout(() => { banner.style.display = "none"; }, 5000);
        } 
        else if (urlParams.has('error')) {
            banner.innerText = "❌ Error: Could not send email. Check your Google permissions.";
            banner.className = "bg-error";
            banner.style.display = "block";
            window.history.replaceState({}, document.title, "/");
        }
    };

    function loadTable() {
        fetch('/view')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('dataTableBody');
                tbody.innerHTML = ''; 
                data.forEach(row => {
                    tbody.innerHTML += `<tr><td>${row.name}</td><td>${row.email}</td><td>${row.description}</td></tr>`;
                });
            });
    }

    function addData() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('emailData').value;
        const desc = document.getElementById('desc').value;

        if (!name || !email) return alert("Please fill in Name and Email!");

        // Construct the data object to match your UserData model fields
        const userData = {
            name: name,
            email: email,       // Ensure this matches the field name in your Java model
            description: desc   // Ensure this matches the field name in your Java model
        };

        fetch('/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(userData)
        })
        .then(response => {
            if (response.ok) {
                alert("✅ Saved to Postgres via POST!");
                loadTable();
                // Clear inputs
                document.getElementById('name').value = '';
                document.getElementById('emailData').value = '';
                document.getElementById('desc').value = '';
            } else {
                alert("❌ Server error: " + response.status);
            }
        })
        .catch(err => console.error("Error adding data:", err));
    }

    /**
     * Triggers the Gmail REST API flow.
     * We use window.location.href because if the OAuth token is expired,
     * the browser needs to perform a full redirect to Google's login page.
     */
    function sendEmail() {
        const recipient = document.getElementById('recipientEmail').value;
        if(!recipient) return alert("Please enter a recipient email!");

        // Show loading state
        document.getElementById('emailLoader').style.display = 'block';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('sendBtn').style.opacity = '0.5';

        // Redirect to your Spring Boot Controller
        window.location.href = `/send?email=${encodeURIComponent(recipient)}`;
    }

    function clearData() {
        if(confirm("Wipe the entire table?")) {
            fetch('/delete-all').then(() => {
                loadTable();
                alert("🗑️ Database Cleared");
            });
        }
    }
</script>

</body>
</html>
